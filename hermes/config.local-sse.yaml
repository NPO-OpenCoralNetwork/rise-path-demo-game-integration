# Rise Path — local Mac: Hermes → MCP SSE (http://127.0.0.1:3100)
# Generated by: npm run setup:hermes-local
# Start MCP first: npm run mcp:local

skills:
  external_dirs:
    - RISE_PATH_SKILLS_DIR

mcp_servers:
  rise_path:
    url: "http://127.0.0.1:3100/sse"
    headers:
      Authorization: "Bearer __RISE_PATH_BRIDGE_TOKEN__"
    enabled: true
    timeout: 120
    connect_timeout: 60
    tools:
      include:
        - learner-personal-context
        - learner-memory-recall
        - learner-memory-remember
        - daily-life-chat-context
        - daily-life-analysis
        - daily-life-advice
        - learner-adaptation-signals
        - journal-recent
        - journal-log
        - learner-state-get
        - get-generation-kit
        - validate-intake
        - save-curriculum-draft
        - rag-search
        - request-tts
      resources: true
      prompts: false