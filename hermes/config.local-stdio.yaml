# Rise Path — local Mac: Hermes spawns MCP via stdio (no separate MCP process)
# Generated by: npm run setup:hermes-local -- --stdio

skills:
  external_dirs:
    - RISE_PATH_SKILLS_DIR

mcp_servers:
  rise_path:
    command: "node"
    args:
      - "RISE_PATH_ROOT/mcp-server/index.js"
    env:
      DATABASE_URL_PHASE1: "${DATABASE_URL_PHASE1}"
      PHASE1_USER_ID: "${PHASE1_USER_ID}"
      RISE_PATH_ACTIVE_SESSION_KEY: "${RISE_PATH_ACTIVE_SESSION_KEY}"
    enabled: true
    timeout: 120
    connect_timeout: 60
    tools:
      include:
        - learner-personal-context
        - learner-memory-recall
        - learner-memory-remember
        - daily-life-chat-context
        - daily-life-analysis
        - daily-life-advice
        - learner-adaptation-signals
        - journal-recent
        - journal-log
        - learner-state-get
        - get-generation-kit
        - validate-intake
        - save-curriculum-draft
        - rag-search
        - request-tts
      resources: true
      prompts: false