<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect x="0" y="0" width="1920" height="140" fill="url(#accent)"/>
  <text x="96" y="95" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="40" fill="#ffffff" font-weight="700">変数とメモリ管理</text>
  <text x="96" y="128" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="20" fill="#e0e7ff">Pythonのデータ処理の仕組み</text>
  <rect x="80" y="200" width="1760" height="780" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="140" y="310" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="46" fill="#0f172a" font-weight="700">オブジェクトとID</text>
  <text x="140" y="360" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="24" fill="#64748b">同一性（identity）の考え方</text>
  <g font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="28" fill="#0f172a">
    <circle cx="160" cy="442" r="6" fill="#7c3aed"/>
    <text x="180" y="450" font-size="28" fill="#0f172a">id() はオブジェクトの同一性を示す</text>
    <circle cx="160" cy="502" r="6" fill="#7c3aed"/>
    <text x="180" y="510" font-size="28" fill="#0f172a">可変型は変更してもIDが変わらない</text>
    <circle cx="160" cy="562" r="6" fill="#7c3aed"/>
    <text x="180" y="570" font-size="28" fill="#0f172a">不変型は変更時に新しいIDになる</text>
  </g>
  <g>
      <rect x="1080" y="360" width="300" height="120" rx="18" fill="#ecfeff" stroke="#06b6d4"/>
      <text x="1120" y="420" font-size="22" fill="#0e7490" font-weight="700">list [1,2,3]</text>
      <rect x="1390" y="380" width="180" height="60" rx="12" fill="#cffafe" stroke="#06b6d4"/>
      <text x="1405" y="420" font-size="18" fill="#0e7490">id: 0x1A2B</text>
      <rect x="1080" y="520" width="300" height="120" rx="18" fill="#fef2f2" stroke="#f87171"/>
      <text x="1120" y="580" font-size="22" fill="#b91c1c" font-weight="700">int 10 → 11</text>
      <rect x="1390" y="540" width="180" height="60" rx="12" fill="#fee2e2" stroke="#f87171"/>
      <text x="1405" y="580" font-size="18" fill="#b91c1c">id: 0x9C3D</text>
      <rect x="1390" y="610" width="180" height="60" rx="12" fill="#fee2e2" stroke="#f87171"/>
      <text x="1405" y="650" font-size="18" fill="#b91c1c">id: 0x7F88</text>
    </g>
</svg>