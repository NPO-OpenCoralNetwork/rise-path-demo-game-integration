<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect x="0" y="0" width="1920" height="140" fill="url(#accent)"/>
  <text x="96" y="95" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="40" fill="#ffffff" font-weight="700">変数とメモリ管理</text>
  <text x="96" y="128" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="20" fill="#e0e7ff">Pythonのデータ処理の仕組み</text>
  <rect x="80" y="200" width="1760" height="780" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="140" y="310" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="46" fill="#0f172a" font-weight="700">参照とコピー</text>
  <text x="140" y="360" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="24" fill="#64748b">代入は参照のコピー</text>
  <g font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="28" fill="#0f172a">
    <circle cx="160" cy="442" r="6" fill="#7c3aed"/>
    <text x="180" y="450" font-size="28" fill="#0f172a">a = b はデータではなく参照を共有</text>
    <circle cx="160" cy="502" r="6" fill="#7c3aed"/>
    <text x="180" y="510" font-size="28" fill="#0f172a">copy() / スライスで浅いコピー</text>
    <circle cx="160" cy="562" r="6" fill="#7c3aed"/>
    <text x="180" y="570" font-size="28" fill="#0f172a">ネスト構造は deepcopy() が必要</text>
  </g>
  <g>
      <rect x="1040" y="350" width="260" height="110" rx="16" fill="#eef2ff" stroke="#a5b4fc"/>
      <text x="1080" y="410" font-size="22" fill="#4338ca" font-weight="700">a → [1,2,3]</text>
      <rect x="1040" y="500" width="260" height="110" rx="16" fill="#eef2ff" stroke="#a5b4fc"/>
      <text x="1080" y="560" font-size="22" fill="#4338ca" font-weight="700">b → [1,2,3]</text>
      <rect x="1400" y="420" width="260" height="110" rx="16" fill="#ecfccb" stroke="#84cc16"/>
      <text x="1440" y="480" font-size="22" fill="#3f6212" font-weight="700">c → [1,2,3]</text>
      <line x1="1300" y1="405" x2="1390" y2="450" stroke="#7c3aed" stroke-width="4"/>
      <line x1="1300" y1="555" x2="1390" y2="470" stroke="#7c3aed" stroke-width="4"/>
    </g>
</svg>