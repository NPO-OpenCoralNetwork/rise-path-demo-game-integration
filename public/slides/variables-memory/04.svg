<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect x="0" y="0" width="1920" height="140" fill="url(#accent)"/>
  <text x="96" y="95" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="40" fill="#ffffff" font-weight="700">変数とメモリ管理</text>
  <text x="96" y="128" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="20" fill="#e0e7ff">Pythonのデータ処理の仕組み</text>
  <rect x="80" y="200" width="1760" height="780" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="140" y="310" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="46" fill="#0f172a" font-weight="700">可変 / 不変</text>
  <text x="140" y="360" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="24" fill="#64748b">変更できるかどうかの違い</text>
  <g font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="28" fill="#0f172a">
    <circle cx="160" cy="442" r="6" fill="#7c3aed"/>
    <text x="180" y="450" font-size="28" fill="#0f172a">可変: list, dict, set</text>
    <circle cx="160" cy="502" r="6" fill="#7c3aed"/>
    <text x="180" y="510" font-size="28" fill="#0f172a">不変: int, str, tuple</text>
    <circle cx="160" cy="562" r="6" fill="#7c3aed"/>
    <text x="180" y="570" font-size="28" fill="#0f172a">データの流れや副作用に影響する</text>
  </g>
  <g>
      <rect x="1040" y="360" width="320" height="260" rx="20" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="1080" y="420" font-size="24" fill="#1d4ed8" font-weight="700">Mutable</text>
      <text x="1080" y="470" font-size="20" fill="#1e3a8a">list / dict / set</text>
      <rect x="1410" y="360" width="320" height="260" rx="20" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="1450" y="420" font-size="24" fill="#92400e" font-weight="700">Immutable</text>
      <text x="1450" y="470" font-size="20" fill="#92400e">int / str / tuple</text>
      <path d="M1180 520 q40 40 0 80" stroke="#2563eb" stroke-width="5" fill="none"/>
      <path d="M1510 520 q40 40 0 80" stroke="#d97706" stroke-width="5" fill="none"/>
    </g>
</svg>